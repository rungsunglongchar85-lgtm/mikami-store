<!DOCTYPE html>
<html>
<body style="background:black;color:white;padding:20px">

<h2>ADMIN PANEL</h2>

<button onclick="load()">Load Orders</button>

<pre id="data"></pre>

<script>
function load(){
fetch('/api/orders',{
headers:{
'Authorization':'Bearer '+localStorage.token
}
})
.then(r=>r.json())
.then(d=>{
document.getElementById('data').innerText =
JSON.stringify(d,null,2)
})
}
</script>

</body>
</html>
